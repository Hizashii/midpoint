<span class="material-symbols-outlined text-primary" data-icon="location_on">location_on</span>
</div>

</div>
<button class="w-full flex items-center justify-center gap-2 py-3 px-4 bg-surface-container-low hover:bg-surface-container-high text-on-surface font-semibold text-sm rounded-xl transition-colors">
<span class="material-symbols-outlined text-sm" data-icon="near_me">near_me</span>

                </button>
</section>

<section class="bg-surface-container-lowest/90 backdrop-blur-xl p-6 rounded-xl ambient-shadow space-y-8">

<label class="font-headline font-bold text-sm uppercase tracking-widest text-on-surface-variant">Transport Mode</label>
<div class="grid grid-cols-4 gap-2">
<button class="flex flex-col items-center justify-center gap-2 p-3 rounded-xl bg-primary text-on-primary transition-all scale-95 duration-200 ease-in-out">

<button class="flex flex-col items-center justify-center gap-2 p-3 rounded-xl bg-surface-container-high text-on-surface hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined" data-icon="train">train</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Transit</span>
</button>
<button class="flex flex-col items-center justify-center gap-2 p-3 rounded-xl bg-surface-container-high text-on-surface hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined" data-icon="directions_car">directions_car</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Car</span>

</div>

</div>
<div class="relative w-full h-1.5 bg-surface-container-highest rounded-full">

</div>

</div>
<div class="w-14 h-8 bg-primary rounded-full relative p-1 cursor-pointer">

<span class="absolute left-1.5 top-1/2 -translate-y-1/2 material-symbols-outlined text-[12px] text-on-primary" data-icon="timer">timer</span>
</div>
</div>

<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-manrope font-bold py-4 rounded-xl text-lg shadow-lg hover:shadow-xl active:scale-95 transition-all duration-200">

</footer>

<span class="font-inter font-medium text-[10px] uppercase tracking-wider">Sessions</span>
