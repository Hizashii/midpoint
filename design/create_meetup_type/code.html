<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-lowest": "#ffffff",
              "secondary-fixed": "#e6e1e1",
              "background": "#fdf8f8",
              "tertiary-fixed-dim": "#79d6cf",
              "surface-container-highest": "#e6e1e1",
              "outline-variant": "#c1c6d7",
              "on-secondary": "#ffffff",
              "on-surface": "#1c1b1b",
              "on-background": "#1c1b1b",
              "on-primary-fixed-variant": "#004493",
              "on-primary-fixed": "#001a41",
              "surface-dim": "#ddd9d8",
              "secondary-container": "#e6e1e1",
              "surface-container": "#f1edec",
              "outline": "#717786",
              "tertiary-container": "#14827c",
              "primary-fixed-dim": "#adc6ff",
              "on-primary-container": "#fefcff",
              "primary": "#0058bc",
              "on-primary": "#ffffff",
              "surface": "#fdf8f8",
              "tertiary": "#006763",
              "surface-bright": "#fdf8f8",
              "on-tertiary-container": "#f3fffd",
              "primary-container": "#0070eb",
              "on-secondary-container": "#666464",
              "error": "#ba1a1a",
              "inverse-surface": "#313030",
              "secondary-fixed-dim": "#c9c6c5",
              "surface-container-low": "#f7f2f2",
              "inverse-on-surface": "#f4f0ef",
              "secondary": "#605e5e",
              "surface-tint": "#005bc1",
              "on-secondary-fixed-variant": "#484646",
              "tertiary-fixed": "#96f3eb",
              "on-tertiary-fixed": "#00201e",
              "surface-container-high": "#ece7e7",
              "on-tertiary-fixed-variant": "#00504c",
              "surface-variant": "#e6e1e1",
              "error-container": "#ffdad6",
              "primary-fixed": "#d8e2ff",
              "on-tertiary": "#ffffff",
              "inverse-primary": "#adc6ff",
              "on-error": "#ffffff",
              "on-secondary-fixed": "#1c1b1b",
              "on-surface-variant": "#414755",
              "on-error-container": "#93000a"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .bg-map-overlay {
            background-image: linear-gradient(to bottom, rgba(253, 248, 248, 0.4), rgba(253, 248, 248, 0));
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body antialiased min-h-screen overflow-hidden">
<!-- Map Background -->
<div class="fixed inset-0 z-0">
<img class="w-full h-full object-cover grayscale opacity-40" data-alt="A clean minimalist city map illustration" data-location="San Francisco" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC3tl1aB4hcBPqDKbRU2iUFg5r6vjnz9wTWmPdRZFfrFz2LD5LYGciM_lG2ZySxbJ6f5sDUze45d33T7oXxNzxWYEHoLZtYWcAagO5NugJ3JV9DUWiojQZ0pg2-C82hsPjK5eM6GtsdgsdOBYG9gC_OhH4Onym9YOe-dh15eoiBR3x2-VSMJ-ApMaOTPq3tUEqBn1DmhelGherWzhnS7IBnA88gfCNHactymE0SnwjO3N1j0KUmFdemx_6qn1ALow7ljeAM08I12vU"/>
<div class="absolute inset-0 bg-map-overlay"></div>
</div>
<!-- Top Navigation Bar (Shared Component Strategy) -->
<header class="bg-[#fdf8f8]/80 dark:bg-[#1c1b1b]/80 backdrop-blur-3xl sticky top-0 z-50 flex justify-between items-center px-6 py-4 w-full shadow-sm dark:shadow-none">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#0058bc]" data-icon="explore">explore</span>
<span class="font-manrope font-extrabold text-[#1c1b1b] dark:text-[#fdf8f8] tracking-tight text-xl">Midpoint</span>
</div>
<div class="w-8 h-8 rounded-full overflow-hidden border-2 border-primary-container">
<img class="w-full h-full object-cover" data-alt="User profile circular avatar photo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCULKVMLANefl3KS8bHRVM0iNZa9cPwMN4Z38kH3HWDs3H56LyZssjbCYVKhy0M07ImkqbLY3Ge9UDMA72xH-F7zppPX1LGwlodtYPIFClFCQHgVC2MEgijUd4WZi-_2oYkIjOQMsB04cZlJQ7b3yNN25M96bkG7VJzzsz4AAwggYsclNdM4-NjyoQSY_KGi13PbRYFxCMvzVJofJL7AeAkT8m65_JpSZMmG6bvUpgS0I46809EZTngRSXw_IKRWMKgvUFh_47MyWA"/>
</div>
</header>
<!-- Main Content Area / Step Flow -->
<main class="relative z-10 flex flex-col h-[calc(100vh-64px)] justify-end">
<!-- Animated Bottom Sheet Mock -->
<div class="bg-surface shadow-[0_-8px_40px_rgba(0,0,0,0.08)] rounded-t-[2.5rem] px-6 pt-3 pb-10 w-full max-w-xl mx-auto flex flex-col gap-6">
<!-- Drag Handle / Visual Anchor -->
<div class="w-12 h-1.5 bg-outline-variant/30 rounded-full mx-auto mb-2"></div>
<!-- Progress Indicator -->
<div class="flex items-center justify-between w-full mb-2">
<div class="flex gap-1.5 w-full">
<div class="h-1.5 rounded-full flex-1 bg-primary"></div>
<div class="h-1.5 rounded-full flex-1 bg-surface-container-high"></div>
<div class="h-1.5 rounded-full flex-1 bg-surface-container-high"></div>
</div>
<span class="ml-4 font-label text-xs font-semibold text-primary uppercase tracking-widest whitespace-nowrap">Step 1 of 3</span>
</div>
<!-- Header Content -->
<div class="space-y-1">
<h1 class="font-headline font-extrabold text-3xl text-on-surface tracking-tight">Choose Meetup Type</h1>
<p class="font-body text-on-surface-variant text-sm">Select the vibe for your gathering.</p>
</div>
<!-- Selection Bento Grid -->
<div class="grid grid-cols-2 gap-3">
<!-- Option: Coffee -->
<button class="flex flex-col items-start p-5 bg-surface-container-lowest hover:bg-surface-container-low border-2 border-transparent focus:border-primary/20 rounded-xl transition-all group">
<div class="w-10 h-10 rounded-lg bg-surface-container-low flex items-center justify-center mb-4 group-hover:bg-surface-container-lowest transition-colors">
<span class="material-symbols-outlined text-primary" data-icon="coffee">coffee</span>
</div>
<span class="font-manrope font-bold text-lg text-on-surface">Coffee</span>
</button>
<!-- Option: Dinner -->
<button class="flex flex-col items-start p-5 bg-surface-container-lowest hover:bg-surface-container-low border-2 border-transparent focus:border-primary/20 rounded-xl transition-all group">
<div class="w-10 h-10 rounded-lg bg-surface-container-low flex items-center justify-center mb-4 group-hover:bg-surface-container-lowest transition-colors">
<span class="material-symbols-outlined text-primary" data-icon="restaurant">restaurant</span>
</div>
<span class="font-manrope font-bold text-lg text-on-surface">Dinner</span>
</button>
<!-- Option: Drinks -->
<button class="flex flex-col items-start p-5 bg-surface-container-lowest hover:bg-surface-container-low border-2 border-transparent focus:border-primary/20 rounded-xl transition-all group">
<div class="w-10 h-10 rounded-lg bg-surface-container-low flex items-center justify-center mb-4 group-hover:bg-surface-container-lowest transition-colors">
<span class="material-symbols-outlined text-primary" data-icon="local_bar">local_bar</span>
</div>
<span class="font-manrope font-bold text-lg text-on-surface">Drinks</span>
</button>
<!-- Option: Coworking -->
<button class="flex flex-col items-start p-5 bg-surface-container-lowest hover:bg-surface-container-low border-2 border-transparent focus:border-primary/20 rounded-xl transition-all group">
<div class="w-10 h-10 rounded-lg bg-surface-container-low flex items-center justify-center mb-4 group-hover:bg-surface-container-lowest transition-colors">
<span class="material-symbols-outlined text-primary" data-icon="laptop_mac">laptop_mac</span>
</div>
<span class="font-manrope font-bold text-lg text-on-surface">Coworking</span>
</button>
<!-- Option: Park -->
<button class="flex flex-col items-start p-5 bg-surface-container-lowest hover:bg-surface-container-low border-2 border-transparent focus:border-primary/20 rounded-xl transition-all group">
<div class="w-10 h-10 rounded-lg bg-surface-container-low flex items-center justify-center mb-4 group-hover:bg-surface-container-lowest transition-colors">
<span class="material-symbols-outlined text-primary" data-icon="park">park</span>
</div>
<span class="font-manrope font-bold text-lg text-on-surface">Park</span>
</button>
<!-- Option: Custom -->
<button class="flex flex-col items-start p-5 bg-surface-container-lowest hover:bg-surface-container-low border-2 border-primary/40 rounded-xl transition-all group">
<div class="w-10 h-10 rounded-lg bg-primary-fixed flex items-center justify-center mb-4 group-hover:bg-primary-fixed-dim transition-colors">
<span class="material-symbols-outlined text-primary" data-icon="add_circle">add_circle</span>
</div>
<span class="font-manrope font-bold text-lg text-on-surface">Custom</span>
</button>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-manrope font-bold py-4 px-6 rounded-xl shadow-lg shadow-primary/20 active:scale-95 transition-all flex justify-center items-center gap-2">
<span>Next Step</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>
</main>
<!-- Navigation suppressed per rules for Transactional/Focused journeys -->
<!-- Toast/Feedback Layer (Subtle) -->
<div class="fixed top-20 left-1/2 -translate-x-1/2 z-50 pointer-events-none">
<div class="bg-inverse-surface text-inverse-on-surface px-4 py-2 rounded-full text-xs font-label flex items-center gap-2 shadow-xl opacity-0">
<span class="material-symbols-outlined text-sm" data-icon="info">info</span>
            Meeting type helps us calculate the perfect center.
        </div>
</div>
</body></html>
